name: shipengine
module: shipping
version: 1.0.0
description: ShipEngine shipping adapter

implements:
  - getRates
  - createShipment
  - getShipment
  - trackShipment
  - cancelShipment
  - createLabel
  - getLabel
  - validateAddress

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: ShipEngine API key
      secret: true
  optional:
    - name: carrier_id
      type: string
      description: Default carrier ID
    - name: warehouse_id
      type: string
      description: Default warehouse ID

dependencies:
  - module: orders
    purpose: Get order data for shipments
    required: true
  - module: notifications
    purpose: Send tracking updates
    required: false
  - module: audit_log
    purpose: Log shipping events
    required: false

metadata:
  provider_url: https://www.shipengine.com
  docs_url: https://www.shipengine.com/docs