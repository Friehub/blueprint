name: stripe
module: donations
version: 1.0.0
description: Stripe donations adapter

implements:
  - createCampaign
  - getCampaign
  - listCampaigns
  - donate
  - getDonation
  - getDonationsByCampaign
  - getCampaignStats
  - issueCertificate

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Stripe secret API key
      secret: true
    - name: webhook_secret
      type: string
      description: Stripe webhook signing secret
      secret: true
  optional:
    - name: api_version
      type: string
      default: "2023-10-16"
      description: Stripe API version

dependencies:
  - module: payments
    purpose: Process donation payments
    required: true
  - module: notifications
    purpose: Send donation receipts
    required: false
  - module: audit_log
    purpose: Log donation events
    required: false

metadata:
  provider_url: https://stripe.com
  docs_url: https://stripe.com/docs