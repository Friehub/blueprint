name: pagerduty
module: incident_management
version: 1.0.0
description: PagerDuty incident management adapter
languages: [typescript, python, go, rust, java]

implements:
  - createIncident
  - getIncident
  - listIncidents
  - acknowledgeIncident
  - assignIncident
  - updateIncidentSeverity
  - addIncidentNote
  - resolveIncident
  - createRunbookLink

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: PagerDuty API key
      secret: true
    - name: service_id
      type: string
      description: PagerDuty service ID
      secret: false
    - name: escalation_policy_id
      type: string
      description: PagerDuty escalation policy ID
      secret: false
  optional:
    - name: from_email
      type: string
      description: PagerDuty user email for API calls

dependencies:
  - module: notifications
    purpose: Send incident notifications
    required: false
  - module: audit_log
    purpose: Log incident events
    required: false

metadata:
  provider_url: https://www.pagerduty.com
  docs_url: https://developer.pagerduty.com