name: gremlin
module: chaos_engineering
version: 1.0.0
description: Gremlin failure injection adapter
languages: [typescript, python, go, java]

implements:
  - defineExperiment
  - getExperiment
  - listExperiments
  - runExperiment
  - stopExperiment
  - injectFailure
  - validateSteadyState
  - rollbackExperiment
  - scheduleExperiment

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Gremlin API key
      secret: true
    - name: team_id
      type: string
      description: Gremlin team identifier
  optional:
    - name: base_url
      type: string
      default: https://api.gremlin.com
      description: Gremlin API base URL

metadata:
  provider_url: https://www.gremlin.com
  docs_url: https://docs.gremlin.com
