name: stripe
module: chargebacks
version: 1.0.0
description: Stripe chargebacks adapter

implements:
  - createChargeback
  - getChargeback
  - listChargebacks
  - submitEvidence
  - updateChargebackStatus
  - closeChargeback

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Stripe secret API key
      secret: true
    - name: webhook_secret
      type: string
      description: Stripe webhook signing secret
      secret: true
  optional:
    - name: api_version
      type: string
      default: "2023-10-16"
      description: Stripe API version

dependencies:
  - module: payments
    purpose: Access payment data for chargebacks
    required: true
  - module: notifications
    purpose: Send chargeback notifications
    required: false
  - module: audit_log
    purpose: Log chargeback events
    required: false

metadata:
  provider_url: https://stripe.com
  docs_url: https://stripe.com/docs/disputes