name: recurly
module: billing
version: 1.0.0
description: Recurly billing subscription and plan management adapter
languages: [typescript, python, go, rust, java]

implements:
  - createSubscription
  - getSubscription
  - upgradeSubscription
  - downgradeSubscription
  - cancelSubscription
  - reactivateSubscription
  - getInvoices
  - getInvoice
  - getPlans
  - getPlan

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Recurly API key
      secret: true
    - name: site_id
      type: string
      description: Recurly site ID
      secret: false
  optional:
    - name: environment
      type: string
      default: production
      description: Recurly environment
    - name: webhook_secret
      type: string
      description: Recurly webhook secret
      secret: true

dependencies:
  - module: payments
    purpose: Process subscription payments
    required: true
  - module: notifications
    purpose: Send subscription lifecycle emails
    required: false
  - module: audit_log
    purpose: Log subscription events
    required: false

metadata:
  provider_url: https://recurly.com
  docs_url: https://docs.recurly.com
