name: easyship
module: fulfillment
version: 1.0.0
description: Easyship fulfillment adapter

implements:
  - createFulfillment
  - getFulfillment
  - listFulfillments
  - assignWarehouse
  - markPacked
  - markShipped
  - markDelivered
  - cancelFulfillment

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Easyship API key
      secret: true
  optional:
    - name: store_id
      type: string
      description: Easyship store ID
    - name: warehouse_id
      type: string
      description: Easyship warehouse ID

dependencies:
  - module: orders
    purpose: Get order data for fulfillment
    required: true
  - module: inventory
    purpose: Check inventory availability
    required: true
  - module: shipping
    purpose: Create and track shipments
    required: true
  - module: notifications
    purpose: Send fulfillment updates
    required: false
  - module: audit_log
    purpose: Log fulfillment events
    required: false

metadata:
  provider_url: https://www.easyship.com
  docs_url: https://docs.easyship.com