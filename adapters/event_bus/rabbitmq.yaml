name: rabbitmq
module: event_bus
version: 1.0.0
description: RabbitMQ pub/sub event bus adapter
languages: [typescript, python, go, rust, java]

implements:
  - publish
  - publishBulk
  - subscribe
  - unsubscribe
  - getSubscriptions
  - getDeadLetters
  - retryDeadLetter

does_not_implement:
  - replay

config:
  required:
    - name: url
      type: string
      description: RabbitMQ connection URL
      secret: false
  optional:
    - name: exchange
      type: string
      default: blueprint
      description: Default exchange name
    - name: exchange_type
      type: string
      default: topic
      description: Exchange type (topic, direct, fanout)
    - name: prefetch_count
      type: integer
      default: 10
      description: Consumer prefetch count
    - name: heartbeat
      type: integer
      default: 60
      description: Connection heartbeat interval (seconds)
    - name: ssl_enabled
      type: boolean
      default: false
      description: Enable SSL connection

dependencies: []

metadata:
  provider_url: https://www.rabbitmq.com
  docs_url: https://www.rabbitmq.com/documentation.html
