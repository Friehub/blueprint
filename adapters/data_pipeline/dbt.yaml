name: dbt
module: data_pipeline
version: 1.0.0
description: dbt data transformation pipeline adapter
languages: [typescript, python, go, rust, java]

implements:
  - definePipeline
  - getPipeline
  - listPipelines
  - runPipeline
  - getRun
  - getRunHistory
  - retryStage
  - deletePipeline

does_not_implement:
  - pausePipeline
  - resumePipeline

config:
  required:
    - name: account_id
      type: string
      description: dbt Cloud account ID
      secret: false
    - name: api_token
      type: string
      description: dbt Cloud API token
      secret: true
  optional:
    - name: project_id
      type: string
      description: dbt Cloud project ID
    - name: environment_id
      type: string
      description: dbt Cloud environment ID
    - name: api_url
      type: string
      default: https://cloud.getdbt.com/api/v2
      description: dbt Cloud API URL
    - name: threads
      type: integer
      default: 4
      description: Model build threads

dependencies:
  - module: data_warehouse
    purpose: Transform data in warehouse
    required: true
  - module: audit_log
    purpose: Log pipeline events
    required: false

metadata:
  provider_url: https://www.getdbt.com
  docs_url: https://docs.getdbt.com
