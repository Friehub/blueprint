name: apache_beam
module: data_pipeline
version: 1.0.0
description: Apache Beam data pipeline adapter
languages: [typescript, python, go, rust, java]

implements:
  - definePipeline
  - getPipeline
  - listPipelines
  - runPipeline
  - getRun
  - getRunHistory
  - retryStage
  - pausePipeline
  - resumePipeline
  - deletePipeline

does_not_implement: []

config:
  required:
    - name: project
      type: string
      description: Cloud project ID
      secret: false
    - name: region
      type: string
      description: Compute region
      secret: false
  optional:
    - name: runner
      type: string
      default: DataflowRunner
      description: Pipeline runner (DataflowRunner, DirectRunner, FlinkRunner)
    - name: staging_location
      type: string
      description: GCS staging location
    - name: temp_location
      type: string
      description: GCS temp location
    - name: max_workers
      type: integer
      default: 10
      description: Max worker count
    - name: machine_type
      type: string
      default: n1-standard-2
      description: Worker machine type
    - name: service_account_key
      type: string
      description: Service account key JSON
      secret: true

dependencies:
  - module: data_warehouse
    purpose: Load data into warehouse
    required: true
  - module: audit_log
    purpose: Log pipeline events
    required: false

metadata:
  provider_url: https://beam.apache.org
  docs_url: https://beam.apache.org/documentation
