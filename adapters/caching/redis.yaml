name: redis
module: caching
version: 1.0.0
description: Redis caching adapter

implements:
  - get
  - set
  - del
  - getOrSet
  - invalidateByTag
  - invalidateByPrefix
  - mget
  - mset
  - increment
  - decrement

does_not_implement: []

config:
  required:
    - name: url
      type: string
      description: Redis connection URL
      secret: false
  optional:
    - name: host
      type: string
      default: "localhost"
      description: Redis host
    - name: port
      type: integer
      default: 6379
      description: Redis port
    - name: password
      type: string
      description: Redis password
      secret: true
    - name: db
      type: integer
      default: 0
      description: Redis database number

dependencies: []

metadata:
  provider_url: https://redis.io
  docs_url: https://redis.io/docs