name: bullmq
module: queues
version: 1.0.0
description: BullMQ queue adapter
languages: [typescript, python, go, rust, java]

implements:
  - enqueue
  - enqueueBulk
  - scheduleJob
  - cancelJob
  - getJob
  - getJobStatus
  - retryJob
  - getQueueStats
  - purgeQueue

does_not_implement: []

config:
  required:
    - name: redis_url
      type: string
      description: Redis connection URL for BullMQ
      secret: false
  optional:
    - name: redis_host
      type: string
      default: "localhost"
      description: Redis host
    - name: redis_port
      type: integer
      default: 6379
      description: Redis port
    - name: redis_password
      type: string
      description: Redis password
      secret: true
    - name: redis_db
      type: integer
      default: 0
      description: Redis database number

dependencies: []

metadata:
  provider_url: https://docs.bullmq.io
  docs_url: https://docs.bullmq.io