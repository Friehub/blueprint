name: auth0
module: auth
version: 1.0.0
description: Auth0 authentication adapter

implements:
  - signUp
  - signIn
  - signInWithProvider
  - signOut
  - refreshToken
  - verifyToken
  - requestPasswordReset
  - confirmPasswordReset
  - verifyEmail
  - resendVerification

does_not_implement: []

config:
  required:
    - name: domain
      type: string
      description: Auth0 domain
      secret: false
    - name: client_id
      type: string
      description: Auth0 client ID
      secret: false
    - name: client_secret
      type: string
      description: Auth0 client secret
      secret: true
    - name: audience
      type: string
      description: Auth0 API audience
      secret: false
  optional:
    - name: connection
      type: string
      description: Auth0 connection name

dependencies:
  - module: sessions
    purpose: Manage user sessions
    required: true
  - module: users
    purpose: User data storage
    required: true
  - module: audit_log
    purpose: Log authentication events
    required: false

metadata:
  provider_url: https://auth0.com
  docs_url: https://auth0.com/docs