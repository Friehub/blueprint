name: posthog
module: web_analytics
version: 1.0.0
description: PostHog web analytics adapter

implements:
  - trackEvent
  - identifyUser
  - trackPageView
  - getMetrics
  - getFunnel
  - getCohort
  - getRetention

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: PostHog API key
      secret: true
    - name: host
      type: string
      description: PostHog host URL
      secret: false
  optional:
    - name: project_key
      type: string
      description: PostHog project key
    - name: flush_interval
      type: integer
      default: 1000
      description: Flush interval in milliseconds

dependencies:
  - module: audit_log
    purpose: Log analytics events
    required: false

metadata:
  provider_url: https://posthog.com
  docs_url: https://posthog.com/docs