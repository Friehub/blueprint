name: jaeger
module: trace_query
version: 1.0.0
description: Jaeger trace query adapter

implements:
  - queryTraces
  - getTrace
  - getSpan
  - listServices
  - searchTraces
  - getTraceStats
  - getErrorTraces

does_not_implement: []

config:
  required:
    - name: endpoint
      type: string
      description: Jaeger endpoint URL
      secret: false
  optional:
    - name: api_key
      type: string
      description: Jaeger API key
      secret: true
    - name: service
      type: string
      description: Default service name filter

dependencies:
  - module: error_tracking
    purpose: Access error data for traces
    required: false
  - module: audit_log
    purpose: Log trace query events
    required: false

metadata:
  provider_url: https://www.jaegertracing.io
  docs_url: https://www.jaegertracing.io/docs