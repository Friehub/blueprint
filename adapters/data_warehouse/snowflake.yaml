name: snowflake
module: data_warehouse
version: 1.0.0
description: Snowflake data warehouse adapter
languages: [typescript, python, go, rust, java]

implements:
  - createTable
  - getTable
  - listTables
  - createView
  - runQuery
  - getQueryHistory
  - addPartition
  - getStorageUsage
  - setQueryBudget

does_not_implement: []

config:
  required:
    - name: account
      type: string
      description: Snowflake account identifier
      secret: false
    - name: username
      type: string
      description: Snowflake username
      secret: false
    - name: password
      type: string
      description: Snowflake password
      secret: true
    - name: warehouse
      type: string
      description: Snowflake warehouse name
      secret: false
    - name: database
      type: string
      description: Snowflake database name
      secret: false
  optional:
    - name: schema
      type: string
      default: PUBLIC
      description: Default schema
    - name: role
      type: string
      description: Snowflake role
    - name: authenticator
      type: string
      default: snowflake
      description: Authentication method

dependencies:
  - module: reporting
    purpose: Enable reporting queries
    required: false
  - module: audit_log
    purpose: Log query execution
    required: false

metadata:
  provider_url: https://www.snowflake.com
  docs_url: https://docs.snowflake.com
