name: redshift
module: data_warehouse
version: 1.0.0
description: Amazon Redshift data warehouse adapter
languages: [typescript, python, go, rust, java]

implements:
  - createTable
  - getTable
  - listTables
  - createView
  - runQuery
  - getQueryHistory
  - addPartition
  - getStorageUsage
  - setQueryBudget

does_not_implement: []

config:
  required:
    - name: host
      type: string
      description: Redshift cluster hostname
      secret: false
    - name: port
      type: integer
      default: 5439
      description: Redshift port
    - name: database
      type: string
      description: Redshift database name
      secret: false
    - name: username
      type: string
      description: Redshift username
      secret: false
    - name: password
      type: string
      description: Redshift password
      secret: true
  optional:
    - name: schema
      type: string
      default: public
      description: Default schema
    - name: iam_role_arn
      type: string
      description: IAM role for S3 operations
    - name: ssl_enabled
      type: boolean
      default: true
      description: Enable SSL connection

dependencies:
  - module: reporting
    purpose: Enable reporting queries
    required: false
  - module: audit_log
    purpose: Log query execution
    required: false

metadata:
  provider_url: https://aws.amazon.com/redshift
  docs_url: https://docs.aws.amazon.com/redshift
