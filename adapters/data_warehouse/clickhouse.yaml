name: clickhouse
module: data_warehouse
version: 1.0.0
description: ClickHouse data warehouse adapter
languages: [typescript, python, go, rust, java]

implements:
  - createTable
  - getTable
  - listTables
  - createView
  - runQuery
  - getQueryHistory
  - addPartition
  - getStorageUsage
  - setQueryBudget

does_not_implement: []

config:
  required:
    - name: host
      type: string
      description: ClickHouse host
      secret: false
    - name: port
      type: integer
      default: 8123
      description: ClickHouse HTTP port
    - name: database
      type: string
      description: ClickHouse database name
      secret: false
  optional:
    - name: username
      type: string
      description: ClickHouse username
    - name: password
      type: string
      description: ClickHouse password
      secret: true
    - name: protocol
      type: string
      default: http
      description: Connection protocol (http, grpc, native)
    - name: ssl_enabled
      type: boolean
      default: true
      description: Enable SSL connection
    - name: cluster
      type: string
      description: ClickHouse cluster name

dependencies:
  - module: reporting
    purpose: Enable reporting queries
    required: false
  - module: audit_log
    purpose: Log query execution
    required: false

metadata:
  provider_url: https://clickhouse.com
  docs_url: https://clickhouse.com/docs
