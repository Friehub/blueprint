name: sovos
module: taxation
version: 1.0.0
description: Sovos taxation adapter
languages: [typescript, python, go, rust, java]

implements:
  - calculateTax
  - getTaxRate
  - listTaxRates
  - setTaxProfile
  - getTaxProfile
  - validateTaxId
  - previewTax

does_not_implement: []

config:
  required:
    - name: client_id
      type: string
      description: Sovos client ID
      secret: false
    - name: client_secret
      type: string
      description: Sovos client secret
      secret: true
  optional:
    - name: api_url
      type: string
      default: https://api.sovos.com
      description: Sovos API URL
    - name: company_code
      type: string
      description: Sovos company code

dependencies:
  - module: billing
    purpose: Access billing data for tax calculations
    required: false
  - module: invoicing
    purpose: Access invoice data for tax calculations
    required: false
  - module: orders
    purpose: Access order data for tax calculations
    required: false
  - module: audit_log
    purpose: Log tax events
    required: false

metadata:
  provider_url: https://www.sovos.com
  docs_url: https://developer.sovos.com
