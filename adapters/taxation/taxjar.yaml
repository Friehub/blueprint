name: taxjar
module: taxation
version: 1.0.0
description: TaxJar taxation adapter
languages: [typescript, python, go, rust, java]

implements:
  - calculateTax
  - getTaxRate
  - listTaxRates
  - setTaxProfile
  - getTaxProfile
  - validateTaxId
  - previewTax

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: TaxJar API key
      secret: true
  optional:
    - name: api_url
      type: string
      default: https://api.taxjar.com/v2
      description: TaxJar API URL
    - name: nexus_addresses
      type: string
      description: Nexus addresses JSON

dependencies:
  - module: billing
    purpose: Access billing data for tax calculations
    required: false
  - module: invoicing
    purpose: Access invoice data for tax calculations
    required: false
  - module: orders
    purpose: Access order data for tax calculations
    required: false
  - module: audit_log
    purpose: Log tax events
    required: false

metadata:
  provider_url: https://www.taxjar.com
  docs_url: https://developers.taxjar.com