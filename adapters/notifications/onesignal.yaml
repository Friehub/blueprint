name: onesignal
module: notifications
version: 1.0.0
description: OneSignal push notification adapter

implements:
  - sendPush
  - getNotifications
  - markRead
  - markAllRead
  - getUnreadCount
  - updatePreferences
  - getPreferences

does_not_implement:
  - sendEmail
  - sendSMS
  - sendInApp

config:
  required:
    - name: app_id
      type: string
      description: OneSignal app ID
      secret: false
    - name: api_key
      type: string
      description: OneSignal REST API key
      secret: true
  optional:
    - name: channel_for_external_user_ids
      type: string
      description: Channel for external user IDs

dependencies:
  - module: users
    purpose: Get user preferences
    required: true
  - module: audit_log
    purpose: Log notification events
    required: false

metadata:
  provider_url: https://onesignal.com
  docs_url: https://documentation.onesignal.com