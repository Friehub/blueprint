name: opensearch
module: search
version: 1.0.0
description: OpenSearch search adapter
languages: [typescript, python, go, rust, java]

implements:
  - indexDocument
  - indexBulk
  - removeDocument
  - search
  - multiSearch
  - suggest
  - reindex
  - getIndexStats
  - createIndex
  - deleteIndex

does_not_implement: []

config:
  required:
    - name: host
      type: string
      description: OpenSearch host URL
      secret: false
  optional:
    - name: username
      type: string
      description: OpenSearch username
    - name: password
      type: string
      description: OpenSearch password
      secret: true
    - name: api_key
      type: string
      description: OpenSearch API key
      secret: true
    - name: port
      type: integer
      default: 9200
      description: OpenSearch HTTP port
    - name: ssl_enabled
      type: boolean
      default: true
      description: Enable SSL
    - name: max_result_window
      type: integer
      default: 10000
      description: Max result window

dependencies: []

metadata:
  provider_url: https://opensearch.org
  docs_url: https://opensearch.org/docs
