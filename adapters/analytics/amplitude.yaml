name: amplitude
module: analytics
version: 1.0.0
description: Amplitude analytics adapter

implements:
  - trackEvent
  - identifyUser
  - trackPageView
  - getMetrics
  - getFunnel
  - getCohort
  - getRetention

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Amplitude API key
      secret: false
    - name: secret_key
      type: string
      description: Amplitude secret key
      secret: true
  optional:
    - name: server_url
      type: string
      default: https://api.amplitude.com
      description: Amplitude server URL
    - name: batch_size
      type: integer
      default: 10
      description: Event batch size

dependencies:
  - module: audit_log
    purpose: Log analytics events
    required: false

metadata:
  provider_url: https://amplitude.com
  docs_url: https://docs.amplitude.com