name: june
module: analytics
version: 1.0.0
description: June analytics adapter
languages: [typescript, python, go, rust, java]

implements:
  - trackEvent
  - identifyUser
  - trackPageView
  - getMetrics
  - getFunnel
  - getCohort
  - getRetention

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: June API key
      secret: true
  optional:
    - name: host
      type: string
      default: https://api.june.so
      description: June API host
    - name: batch_size
      type: integer
      default: 100
      description: Event batch size

dependencies:
  - module: audit_log
    purpose: Log analytics events
    required: false

metadata:
  provider_url: https://june.so
  docs_url: https://docs.june.so
