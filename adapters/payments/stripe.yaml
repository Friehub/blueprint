name: stripe
module: payments
version: 1.0.0
description: Stripe payment processing adapter
languages: [typescript, python, go, rust, java]

implements:
  - initiatePayment
  - verifyPayment
  - getPaymentByOrder
  - initiateRefund
  - getRefundByOrder
  - getRefund

does_not_implement:
  - getWallet
  - creditWallet
  - debitWallet
  - getWalletTransactions

config:
  required:
    - name: api_key
      type: string
      description: Stripe secret API key
      secret: true
    - name: webhook_secret
      type: string
      description: Stripe webhook signing secret
      secret: true
  optional:
    - name: api_version
      type: string
      default: "2023-10-16"
      description: Stripe API version
    - name: account_id
      type: string
      description: Stripe account ID for Connect

dependencies:
  - module: notifications
    purpose: Send payment confirmation emails
    required: false
  - module: audit_log
    purpose: Log payment events
    required: false

metadata:
  provider_url: https://stripe.com
  docs_url: https://stripe.com/docs