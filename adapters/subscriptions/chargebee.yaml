name: chargebee
module: subscriptions
version: 1.0.0
description: Chargebee subscriptions adapter

implements:
  - createSubscription
  - getSubscription
  - upgradeSubscription
  - downgradeSubscription
  - cancelSubscription
  - reactivateSubscription
  - getInvoices
  - getInvoice
  - getPlans
  - getPlan

does_not_implement:
  - getEntitlements
  - hasAccess
  - grantEntitlement
  - revokeEntitlement
  - getAccessHistory

config:
  required:
    - name: api_key
      type: string
      description: Chargebee API key
      secret: true
    - name: site
      type: string
      description: Chargebee site name

dependencies:
  - module: payments
    purpose: Process subscription payments
    required: true
  - module: notifications
    purpose: Send subscription lifecycle emails
    required: false

metadata:
  provider_url: https://www.chargebee.com
  docs_url: https://www.chargebee.com/docs/apis
