name: chargebee
module: subscriptions
version: 1.0.0
description: Chargebee subscriptions adapter for access management

implements:
  - getEntitlements
  - hasAccess
  - grantEntitlement
  - revokeEntitlement
  - getAccessHistory

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Chargebee API key
      secret: true
    - name: site
      type: string
      description: Chargebee site name

dependencies:
  - module: billing
    purpose: Check subscription status
    required: true

metadata:
  provider_url: https://www.chargebee.com
  docs_url: https://www.chargebee.com/docs/apis
