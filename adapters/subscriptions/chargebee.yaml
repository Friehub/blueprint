name: chargebee
module: subscriptions
version: 1.0.0
description: Chargebee subscriptions adapter

implements:
  - createSubscription
  - getSubscription
  - upgradeSubscription
  - downgradeSubscription
  - cancelSubscription
  - reactivateSubscription
  - getInvoices
  - getInvoice
  - getPlans
  - getPlan

does_not_implement: []

config:
  required:
    - name: api_key
      type: string
      description: Chargebee API key
      secret: true
    - name: site
      type: string
      description: Chargebee site name
      secret: false
  optional:
    - name: environment
      type: string
      default: "production"
      description: Chargebee environment (test or live)

dependencies:
  - module: payments
    purpose: Process subscription payments
    required: true
  - module: notifications
    purpose: Send subscription lifecycle emails
    required: false
  - module: audit_log
    purpose: Log subscription events
    required: false

metadata:
  provider_url: https://chargebee.com
  docs_url: https://chargebee.com/documentation